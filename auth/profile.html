<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | E-Graphisme</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00D4FF; --secondary: #7B2FFF; --accent: #FF006E; --dark: #0a0a0f; --light: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--light); text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .profile-grid { display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        .sidebar { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .user-name { text-align: center; font-size: 20px; margin-bottom: 5px; }
        .user-email { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
        .menu-item { display: block; padding: 15px; border-radius: 10px; color: var(--light); text-decoration: none; transition: all 0.3s; margin-bottom: 5px; }
        .menu-item:hover, .menu-item.active { background: rgba(0,212,255,0.1); color: var(--primary); }
        .menu-item i { width: 25px; }
        .content { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 20px; margin-bottom: 25px; color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid rgba(0,212,255,0.2); background: var(--dark); color: var(--light); font-size: 16px; outline: none; }
        .form-group input:focus { border-color: var(--primary); }
        .btn-save { padding: 15px 40px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--dark); font-size: 16px; font-weight: 600; cursor: pointer; }
        .subscription-card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .subscription-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .plan-name { font-size: 18px; font-weight: 600; }
        .plan-price { font-size: 24px; color: var(--primary); }
        .plan-features { list-style: none; }
        .plan-features li { padding: 8px 0; color: #aaa; }
        .plan-features li i { color: var(--primary); margin-right: 10px; }
        @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="logo">E-Graphisme <span>AI</span></a>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="auth/profile.html" class="active">Profil</a>
                <a href="index.html" onclick="logout()">Déconnexion</a>
            </nav>
        </header>
        
        <div class="profile-grid">
            <aside class="sidebar">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <h2 class="user-name" id="userName">Utilisateur</h2>
                <p class="user-email" id="userEmail">email@example.com</p>
                
                <nav class="menu">
                    <a href="auth/profile.html" class="menu-item active"><i class="fas fa-user"></i> Profil</a>
                    <a href="auth/subscription.html" class="menu-item"><i class="fas fa-credit-card"></i> Abonnement</a>
                    <a href="dashboard.html" class="menu-item"><i class="fas fa-cube"></i> Projets</a>
                    <a href="brand-analyzer.html" class="menu-item"><i class="fas fa-chart-pie"></i> Analyses</a>
                    <a href="index.html" onclick="logout()" class="menu-item"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
                </nav>
            </aside>
            
            <main class="content">
                <h2 class="section-title">Informations du profil</h2>
                <form id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" name="firstName" id="firstName">
                        </div>
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" name="lastName" id="lastName">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" id="email" disabled>
                    </div>
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" name="phone" id="phone">
                    </div>
                    <div class="form-group">
                        <label>Entreprise</label>
                        <input type="text" name="company" id="company">
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea name="bio" id="bio" rows="3" placeholder="Parlez-nous de vous..."></textarea>
                    </div>
                    <button type="submit" class="btn-save">Enregistrer</button>
                </form>
            </main>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        // Charger les données utilisateur
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.firstName) document.getElementById('firstName').value = user.firstName;
        if (user.lastName) document.getElementById('lastName').value = user.lastName;
        if (user.email) document.getElementById('email').value = user.email;
        if (user.phone) document.getElementById('phone').value = user.phone;
        if (user.company) document.getElementById('company').value = user.company;
        if (user.bio) document.getElementById('bio').value = user.bio;
        document.getElementById('userName').textContent = (user.firstName || '') + ' ' + (user.lastName || '');
        document.getElementById('userEmail').textContent = user.email || '';
        
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.id = user.id;
            
            const response = await fetch('/php/auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'updateProfile', ...data })
            });
            const result = await response.json();
            if (result.success) {
                localStorage.setItem('user', JSON.stringify({ ...user, ...data }));
                alert('Profil mis à jour!');
            }
        });
        
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
