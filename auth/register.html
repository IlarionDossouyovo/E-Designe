<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | E-Graphisme</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00D4FF; --secondary: #7B2FFF; --accent: #FF006E; --dark: #0a0a0f; --darker: #050508; --light: #ffffff; --gray: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .register-container { position: relative; width: 100%; max-width: 500px; padding: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo a { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }
        h1 { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 24px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .form-group label .required { color: var(--accent); }
        .form-group input, .form-group select { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid rgba(0, 212, 255, 0.2); background: var(--darker); color: var(--light); font-size: 16px; outline: none; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        .form-group input::placeholder { color: #666; }
        .checkbox-group { display: flex; gap: 10px; align-items: flex-start; }
        .checkbox-group input { width: auto; margin-top: 3px; }
        .checkbox-group label { margin: 0; font-size: 14px; color: #aaa; }
        .btn-register { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--dark); font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .btn-register:hover { transform: scale(1.02); }
        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: var(--primary); text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .error-message { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .error-message.show { display: block; }
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="register-container">
        <div class="logo"><a href="index.html">E-Graphisme <span>AI</span></a></div>
        <h1>Créer un compte</h1>
        <p class="subtitle">Commencez votre essai gratuit</p>
        <div class="error-message" id="errorMessage"></div>
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom <span class="required">*</span></label>
                    <input type="text" name="firstName" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label>Prénom <span class="required">*</span></label>
                    <input type="text" name="lastName" placeholder="Votre prénom" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="phone" placeholder="+229 01 977 003 47">
            </div>
            <div class="form-group">
                <label>Entreprise</label>
                <input type="text" name="company" placeholder="Nom de l'entreprise">
            </div>
            <div class="form-group">
                <label>Mot de passe <span class="required">*</span></label>
                <input type="password" name="password" placeholder="••••••••" minlength="8" required>
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe <span class="required">*</span></label>
                <input type="password" name="confirmPassword" placeholder="••••••••" minlength="8" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">J'accepte les <a href="terms.html">conditions d'utilisation</a> et la <a href="privacy.html">politique de confidentialité</a></label>
            </div>
            <button type="submit" class="btn-register">Créer mon compte</button>
        </form>
        <div class="links">
            <a href="auth/login.html">Déjà un compte? Se connecter</a>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const errorEl = document.getElementById('errorMessage');
            
            if (data.password !== data.confirmPassword) {
                errorEl.textContent = 'Les mots de passe ne correspondent pas';
                errorEl.classList.add('show');
                return;
            }
            
            try {
                const response = await fetch('/php/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', ...data })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('authToken', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = result.redirect || 'dashboard.html';
                } else {
                    errorEl.textContent = result.message || 'Erreur inscription';
                    errorEl.classList.add('show');
                }
            } catch (error) {
                errorEl.textContent = 'Erreur. Veuillez réessayer.';
                errorEl.classList.add('show');
            }
        });
    </script>
</body>
</html>
