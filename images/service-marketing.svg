<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="mktGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="250" fill="#0a0a15"/>
  
  <!-- Social Media Icons -->
  <circle cx="100" cy="80" r="30" fill="#4facfe" opacity="0.8"/>
  <path d="M100 55 L100 105 M85 80 L115 80" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <circle cx="200" cy="80" r="30" fill="#00f2fe" opacity="0.8"/>
  <circle cx="200" cy="80" r="8" fill="white"/>
  
  <circle cx="300" cy="80" r="30" fill="#4facfe" opacity="0.6"/>
  <rect x="285" y="65" width="30" height="30" rx="4" fill="white" opacity="0.8"/>
  
  <!-- Chart/Graph -->
  <rect x="60" y="140" width="280" height="80" rx="8" fill="#1a1a2e" stroke="#4facfe" stroke-width="1" opacity="0.5"/>
  
  <!-- Bars -->
  <rect x="80" y="175" width="30" height="35" rx="2" fill="#4facfe"/>
  <rect x="130" y="160" width="30" height="50" rx="2" fill="#00f2fe"/>
  <rect x="180" y="165" width="30" height="45" rx="2" fill="#4facfe" opacity="0.8"/>
  <rect x="230" y="150" width="30" height="60" rx="2" fill="#00f2fe"/>
  <rect x="280" y="170" width="30" height="40" rx="2" fill="#4facfe" opacity="0.6"/>
  
  <!-- Trend Line -->
  <polyline points="95,175 145,160 195,165 245,150 295,170" fill="none" stroke="#f5576c" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Label -->
  <text x="200" y="235" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">MARKETING</text>
