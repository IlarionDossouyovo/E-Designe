  <rect x="30" y="40" width="340" height="120" fill="#15152a"/>
  <circle cx="200" cy="100" r="40" fill="none" stroke="#FFD700" stroke-width="2"/>
  <circle cx="200" cy="100" r="25" fill="#FFD700" opacity="0.5"/>
  <path d="M185 100 L195 90 L195 110 Z" fill="#FFD700"/>
  <!-- Menu section -->
  <rect x="30" y="160" width="340" height="100" fill="#0f0f1a"/>
  <rect x="50" y="175" width="100" height="8" rx="2" fill="#FFD700" opacity="0.6"/>
  <rect x="50" y="190" width="80" height="6" rx="1" fill="#444"/>
