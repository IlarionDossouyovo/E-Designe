      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Restaurant website -->
  <rect x="30" y="40" width="340" height="220" rx="5" fill="#1a1a2e" stroke="#FFD700" stroke-width="1"/>
