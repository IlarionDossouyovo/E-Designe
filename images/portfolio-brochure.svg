<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FFF"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Brochure tri-fold -->
  <g transform="translate(50, 30)">
    <!-- Left panel -->
    <rect x="0" y="0" width="80" height="220" rx="3" fill="#1a1a2e" stroke="#00D4FF" stroke-width="1.5"/>
    <rect x="10" y="15" width="40" height="25" rx="3" fill="url(#accent)" opacity="0.6"/>
    <rect x="10" y="50" width="60" height="8" rx="2" fill="#444"/>
    <rect x="10" y="65" width="55" height="6" rx="1" fill="#333"/>
    <rect x="10" y="78" width="50" height="6" rx="1" fill="#333"/>
    <rect x="10" y="100" width="60" height="60" rx="3" fill="#15152a" stroke="#333"/>
    <circle cx="40" cy="130" r="15" fill="url(#accent)" opacity="0.3"/>
    <!-- Center panel -->
    <rect x="85" y="0" width="80" height="220" rx="3" fill="#1a1a2e" stroke="#7B2FFF" stroke-width="1.5"/>
    <rect x="95" y="15" width="60" height="80" rx="3" fill="#15152a" stroke="#333"/>
    <rect x="105" y="25" width="40" height="15" rx="2" fill="url(#accent)"/>
    <rect x="105" y="50" width="40" height="6" rx="1" fill="#444"/>
    <rect x="105" y="62" width="35" height="6" rx="1" fill="#333"/>
    <rect x="105" y="110" width="40" height="40" rx="2" fill="#0f0f1a" stroke="#333"/>
    <circle cx="125" cy="130" r="12" fill="#00D4FF" opacity="0.4"/>
    <!-- Right panel -->
    <rect x="170" y="0" width="80" height="220" rx="3" fill="#1a1a2e" stroke="#FF006E" stroke-width="1.5"/>
    <rect x="180" y="15" width="60" height="50" rx="3" fill="#15152a" stroke="#333"/>
    <rect x="190" y="25" width="25" height="25" rx="3" fill="url(#accent)"/>
    <rect x="180" y="80" width="60" height="8" rx="2" fill="#444"/>
    <rect x="180" y="95" width="50" height="6" rx="1" fill="#333"/>
    <rect x="180" y="108" width="55" height="6" rx="1" fill="#333"/>
    <rect x="180" y="130" width="60" height="60" rx="3" fill="#15152a" stroke="#333"/>
    <circle cx="210" cy="160" r="18" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="210" cy="160" r="8" fill="url(#accent)"/>
  </g>
  <!-- Decorative elements -->
  <circle cx="350" cy="50" r="40" fill="#00D4FF" opacity="0.08"/>
  <circle cx="50" cy="260" r="30" fill="#7B2FFF" opacity="0.08"/>
  <!-- Text -->
  <rect x="320" y="230" width="70" height="12" rx="2" fill="#444"/>
  <rect x="10" y="260" width="90" height="8" rx="2" fill="#333"/>
</svg>