<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="250" fill="#1a1a2e"/>
  
  <!-- Device Frames -->
  <!-- Desktop -->
  <rect x="30" y="45" width="120" height="80" rx="4" fill="#2a2a3e" stroke="#fa709a" stroke-width="1"/>
  <rect x="35" y="50" width="110" height="60" rx="2" fill="#0a0a15"/>
  <rect x="80" y="115" width="20" height="5" rx="2" fill="#fa709a"/>
  
  <!-- Tablet -->
  <rect x="170" y="55" width="60" height="80" rx="4" fill="#2a2a3e" stroke="#fee140" stroke-width="1"/>
  <rect x="175" y="60" width="50" height="60" rx="2" fill="#0a0a15"/>
  <circle cx="200" cy="128" r="4" fill="#fee140"/>
  
  <!-- Mobile -->
  <rect x="260" y="70" width="30" height="60" rx="4" fill="#2a2a3e" stroke="#fa709a" stroke-width="1"/>
  <rect x="263" y="75" width="24" height="45" rx="2" fill="#0a0a15"/>
  <circle cx="275" cy="123" r="3" fill="#fa709a"/>
  
  <!-- UX Flow Lines -->
  <path d="M155 85 Q200 85 265 100" stroke="#fa709a" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M155 95 Q200 110 265 110" stroke="#fee140" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- Cursor/Interaction -->
  <polygon points="240,145 245,155 248,150 253,155 258,150 253,160 258,165 248,160 244,170 244,160 238,160 243,155" fill="#fa709a"/>
  
  <!-- Label -->
  <text x="200" y="235" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">UI/UX</text>
</svg>