<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="expGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#0a0a15"/>
  
  <!-- Export Options -->
  <rect x="100" y="80" width="180" height="280" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="2"/>
  <text x="190" y="120" font-family="Arial" font-size="18" fill="white" text-anchor="middle">Export</text>
  
  <!-- Quality Options -->
  <rect x="130" y="150" width="120" height="40" rx="5" fill="#10b981"/>
  <text x="190" y="175" font-family="Arial" font-size="14" fill="white" text-anchor="middle">4K Ultra</text>
  <text x="190" y="190" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.7)">3840x2160</text>
  
  <rect x="130" y="200" width="120" height="40" rx="5" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="190" y="225" font-family="Arial" font-size="14" fill="white" text-anchor="middle">1080p Full HD</text>
  <text x="190" y="240" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.7)">1920x1080</text>
  
  <rect x="130" y="250" width="120" height="40" rx="5" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="190" y="275" font-family="Arial" font-size="14" fill="white" text-anchor="middle">720p HD</text>
  <text x="190" y="290" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.7)">1280x720</text>
  
  <!-- Progress -->
  <rect x="320" y="120" width="380" height="200" rx="10" fill="#1a1a2e" stroke="#06b6d4" stroke-width="2"/>
  
  <!-- Video Preview -->
  <rect x="340" y="140" width="340" height="160" rx="5" fill="#0f0f1a"/>
  <rect x="360" y="160" width="120" height="90" rx="4" fill="#10b981" opacity="0.7"/>
  <rect x="500" y="160" width="160" height="12" rx="2" fill="#06b6d4" opacity="0.8"/>
  <rect x="500" y="185" width="120" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="500" y="205" width="140" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="500" y="225" width="100" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="500" y="245" width="150" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="500" y="265" width="80" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  
  <!-- Progress Bar -->
  <rect x="340" y="290" width="340" height="15" rx="7" fill="#2a2a4e"/>
  <rect x="340" y="290" width="200" height="15" rx="7" fill="url(#expGrad)">
    <animate attributeName="width" values="0;340" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="500" y="332" font-family="Arial" font-size="12" fill="#06b6d4" text-anchor="middle">59%</text>
  
  <!-- Export Button -->
  <circle cx="640" cy="380" r="40" fill="url(#expGrad)"/>
  <polygon points="625,365 665,380 625,395" fill="white"/>
  
  <!-- Format Icons -->
  <g transform="translate(50, 50)">
    <rect x="30" y="20" width="50" height="35" rx="3" fill="#10b981"/>
    <text x="55" y="42" font-family="Arial" font-size="8" fill="white" text-anchor="middle">MP4</text>
    <rect x="90" y="20" width="50" height="35" rx="3" fill="#06b6d4"/>
    <text x="115" y="42" font-family="Arial" font-size="8" fill="white" text-anchor="middle">MOV</text>
    <rect x="150" y="20" width="50" height="35" rx="3" fill="#7B2FFF"/>
    <text x="175" y="42" font-family="Arial" font-size="8" fill="white" text-anchor="middle">AVI</text>
  </g>
  
  <!-- Text -->
  <text x="400" y="430" font-family="Arial" font-size="24" fill="white" text-anchor="middle">Export Multi-Format</text>
</svg>