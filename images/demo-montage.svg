<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="montGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#0a0a15"/>
  
  <!-- Timeline -->
  <rect x="50" y="350" width="700" height="60" rx="5" fill="#1a1a2e" stroke="#FF006E" stroke-width="1"/>
  
  <!-- Video Clips -->
  <rect x="80" y="365" width="120" height="30" rx="3" fill="#FF006E" opacity="0.8"/>
  <text x="140" y="385" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Clip 1</text>
  
  <rect x="220" y="365" width="80" height="30" rx="3" fill="#FF6B6B" opacity="0.8"/>
  <text x="260" y="385" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Clip 2</text>
  
  <rect x="320" y="365" width="150" height="30" rx="3" fill="#FF006E" opacity="0.6"/>
  <text x="395" y="385" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Clip 3</text>
  
  <rect x="490" y="365" width="100" height="30" rx="3" fill="#FF6B6B" opacity="0.8"/>
  <text x="540" y="385" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Clip 4</text>
  
  <rect x="610" y="365" width="110" height="30" rx="3" fill="#FF006E" opacity="0.7"/>
  <text x="665" y="385" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Clip 5</text>
  
  <!-- Playhead -->
  <line x1="200" y="340" x2="200" y2="420" stroke="#00D4FF" stroke-width="3"/>
  <polygon points="195,340 205,340 200,330" fill="#00D4FF"/>
  
  <!-- Screen Preview -->
  <rect x="150" y="80" width="500" height="220" rx="8" fill="#1a1a2e" stroke="#FF006E" stroke-width="2"/>
  
  <!-- Video Frame -->
  <rect x="170" y="100" width="460" height="180" rx="4" fill="#0f0f1a"/>
  
  <!-- Content on screen -->
  <rect x="200" y="130" width="150" height="120" rx="4" fill="#FF006E" opacity="0.7"/>
  <rect x="380" y="130" width="220" height="15" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="380" y="160" width="180" height="10" rx="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="380" y="185" width="200" height="10" rx="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="380" y="210" width="140" height="10" rx="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="380" y="235" width="160" height="10" rx="2" fill="#FF6B6B" opacity="0.6"/>
  
  <!-- Tools Panel -->
  <rect x="670" y="100" width="80" height="180" rx="5" fill="#1a1a2e"/>
  <circle cx="710" cy="130" r="15" fill="#FF006E"/>
  <circle cx="710" cy="170" r="15" fill="#2a2a4e" stroke="#FF006E" stroke-width="1"/>
  <circle cx="710" cy="210" r="15" fill="#2a2a4e" stroke="#FF006E" stroke-width="1"/>
  <circle cx="710" cy="250" r="15" fill="#2a2a4e" stroke="#FF006E" stroke-width="1"/>
  
  <!-- Play Button -->
  <circle cx="400" cy="300" r="25" fill="url(#montGrad)"/>
  <polygon points="395,290 410,300 395,310" fill="white"/>
  
  <!-- Text -->
  <text x="400" y="430" font-family="Arial" font-size="24" fill="white" text-anchor="middle">Montage Automatique</text>
</svg>