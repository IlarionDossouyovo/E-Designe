<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="250" fill="#0f0f1a"/>
  
  <!-- Browser Window Frame -->
  <rect x="40" y="30" width="320" height="180" rx="8" fill="url(#screenGrad)" stroke="#38ef7d" stroke-width="1" opacity="0.8"/>
  
  <!-- Browser Top Bar -->
  <rect x="40" y="30" width="320" height="24" rx="8" fill="#11998e" opacity="0.6"/>
  <circle cx="58" cy="42" r="4" fill="#ff6b6b"/>
  <circle cx="74" cy="42" r="4" fill="#ffd93d"/>
  <circle cx="90" cy="42" r="4" fill="#6bcb77"/>
  
  <!-- Website Content Blocks -->
  <rect x="60" y="70" width="80" height="50" rx="4" fill="#11998e" opacity="0.7"/>
  <rect x="160" y="70" width="180" height="15" rx="2" fill="#38ef7d" opacity="0.5"/>
  <rect x="160" y="95" width="120" height="10" rx="2" fill="#38ef7d" opacity="0.3"/>
  <rect x="160" y="115" width="140" height="10" rx="2" fill="#38ef7d" opacity="0.3"/>
  
  <!-- Hero Image Placeholder -->
  <rect x="60" y="135" width="120" height="55" rx="4" fill="#11998e" opacity="0.5"/>
  <circle cx="120" cy="162" r="15" fill="#38ef7d" opacity="0.3"/>
  
  <!-- Call to Action Button -->
  <rect x="200" y="145" width="100" height="30" rx="15" fill="url(#webGrad)"/>
  <text x="250" y="165" font-family="Arial" font-size="11" fill="white" text-anchor="middle">DÉCOUVRIR</text>
  
  <!-- URL Bar -->
  <rect x="60" y="195" width="200" height="8" rx="4" fill="#11998e" opacity="0.4"/>
  <text x="200" y="225" font-family="Arial" font-size="16" fill="#38ef7d" text-anchor="middle" font-weight="bold">WEB DESIGN</text>
</svg>