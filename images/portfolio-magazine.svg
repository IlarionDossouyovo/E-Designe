      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Magazine layout -->
  <rect x="20" y="20" width="180" height="260" fill="#fff" stroke="#333"/>
  <rect x="20" y="20" width="180" height="80" fill="#00D4FF" opacity="0.8"/>
  <text x="110" y="55" text-anchor="middle" fill="#fff" font-size="24" font-family="Georgia" font-weight="bold">LIFESTYLE</text>
  <rect x="30" y="110" width="160" height="100" fill="#1a1a2e"/>
  <rect x="30" y="220" width="80" height="8" rx="2" fill="#333"/>
  <rect x="30" y="235" width="100" height="6" rx="1" fill="#666"/>
  <rect x="30" y="248" width="90" height="6" rx="1" fill="#666"/>
  <!-- Back cover -->
  <rect x="200" y="20" width="180" height="260" fill="#fff" stroke="#333"/>
  <circle cx="290" cy="80" r="30" fill="none" stroke="#7B2FFF" stroke-width="2"/>
  <text x="110" y="285" text-anchor="middle" fill="#333" font-size="10">MAGAZINE LIFESTYLE - MISE EN PAGE</text>
</svg>