<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FFF"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- TechCorp Logo Design -->
  <g transform="translate(150, 100)">
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M30 50 L50 30 L70 70 L50 50" fill="#00D4FF"/>
    <circle cx="50" cy="50" r="15" fill="url(#accent)"/>
  </g>
  <text x="200" y="220" text-anchor="middle" fill="#fff" font-size="18" font-family="Arial">TechCorp</text>
  <text x="200" y="245" text-anchor="middle" fill="#00D4FF" font-size="12" font-family="Arial">BRANDING</text>
  <!-- Decorative -->
  <circle cx="50" cy="50" r="100" fill="#00D4FF" opacity="0.05"/>
  <circle cx="350" cy="250" r="80" fill="#7B2FFF" opacity="0.05"/>
</svg>