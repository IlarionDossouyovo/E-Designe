<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f0f1a"/>
  
  <!-- Website Mockup -->
  <rect x="40" y="40" width="320" height="180" rx="6" fill="#1a1a2e" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="300" height="20" rx="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="65" cy="60" r="4" fill="#ff6b6b"/>
  <circle cx="78" cy="60" r="4" fill="#ffd93d"/>
  <circle cx="91" cy="60" r="4" fill="#6bcb77"/>
  
  <!-- Hero Section -->
  <rect x="60" y="80" width="120" height="60" rx="4" fill="#06b6d4" opacity="0.5"/>
  <rect x="200" y="80" width="140" height="15" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="200" y="105" width="100" height="10" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="200" y="125" width="120" height="10" rx="2" fill="#3b82f6" opacity="0.5"/>
  
  <!-- CTA Button -->
  <rect x="200" y="150" width="80" height="25" rx="12" fill="url(#webGrad)"/>
  <text x="240" y="167" font-family="Arial" font-size="10" fill="white" text-anchor="middle">VOIR PLUS</text>
  
  <!-- Features Grid -->
  <rect x="60" y="155" width="80" height="50" rx="4" fill="#06b6d4" opacity="0.3"/>
  <rect x="150" y="155" width="40" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  
  <!-- Label -->
  <text x="200" y="270" font-family="Arial" font-size="20" fill="white" text-anchor="middle" font-weight="bold">WEB DESIGN</text>
</svg>