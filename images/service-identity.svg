<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f0f1a"/>
  
  <!-- Abstract Logo Mark - Creative Brand Symbol -->
  <g filter="url(#shadow)">
    <polygon points="200,40 280,100 280,180 200,240 120,180 120,100" fill="url(#brandGrad)" opacity="0.9"/>
    <polygon points="200,60 260,110 260,175 200,220 140,175 140,110" fill="#0f0f1a" opacity="0.8"/>
    <polygon points="200,80 240,120 240,170 200,205 160,170 160,120" fill="url(#brandGrad)"/>
  </g>
  
  <!-- Brand Lines - Identity Elements -->
  <line x1="80" y1="260" x2="140" y2="260" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="260" x2="240" y2="260" stroke="#764ba2" stroke-width="4" stroke-linecap="round"/>
  <line x1="260" y1="260" x2="320" y2="260" stroke="#f093fb" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Label -->
  <text x="200" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">IDENTITÉ VISUELLE</text>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="70" r="3" fill="#667eea" opacity="0.5"/>
  <circle cx="350" cy="90" r="2" fill="#f093fb" opacity="0.5"/>
  <circle cx="370" cy="200" r="4" fill="#764ba2" opacity="0.4"/>
</svg>