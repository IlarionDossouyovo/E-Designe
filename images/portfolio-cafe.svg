<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1810"/>
      <stop offset="100%" style="stop-color:#1a0a05"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Café Belle Logo -->
  <g transform="translate(150, 80)">
    <circle cx="50" cy="50" r="50" fill="none" stroke="#D4A574" stroke-width="2"/>
    <path d="M30 60 Q50 30 70 60 Q50 90 30 60" fill="#D4A574"/>
    <text x="50" y="120" text-anchor="middle" fill="#D4A574" font-size="16" font-family="Georgia">Café Belle</text>
  </g>
  <!-- Steam -->
  <g transform="translate(200, 60)" opacity="0.5">
    <path d="M0 0 Q5 -10 0 -20 Q-5 -10 0 0" fill="none" stroke="#D4A574" stroke-width="2">
      <animate attributeName="d" values="M0 0 Q5 -10 0 -20 Q-5 -10 0 0;M0 -10 Q5 -20 0 -30 Q-5 -20 0 -10;M0 0 Q5 -10 0 -20 Q-5 -10 0 0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="200" y="250" text-anchor="middle" fill="#D4A574" font-size="14" font-family="Georgia">IDENTITÉ VISUELLE</text>
  <!-- Decorative beans -->
  <circle cx="40" cy="250" r="8" fill="#D4A574" opacity="0.3"/>
  <circle cx="60" cy="270" r="6" fill="#D4A574" opacity="0.2"/>
</svg>