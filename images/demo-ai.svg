<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#0a0a15"/>
  
  <!-- Background Grid -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#00D4FF" stroke-width="1"/>
  </g>
  
  <!-- AI Brain Icon -->
  <g transform="translate(400, 180)">
    <circle r="120" fill="none" stroke="url(#aiGrad)" stroke-width="2" opacity="0.3"/>
    <circle r="90" fill="none" stroke="url(#aiGrad)" stroke-width="2" opacity="0.5"/>
    <circle r="60" fill="none" stroke="url(#aiGrad)" stroke-width="2"/>
    <circle r="30" fill="url(#aiGrad)"/>
    <!-- Neural Connections -->
    <line x1="0" y1="-60" x2="0" y2="-90" stroke="#00D4FF" stroke-width="2"/>
    <line x1="52" y1="-30" x2="78" y2="-45" stroke="#00D4FF" stroke-width="2"/>
    <line x1="52" y1="30" x2="78" y2="45" stroke="#00D4FF" stroke-width="2"/>
    <line x1="0" y1="60" x2="0" y2="90" stroke="#00D4FF" stroke-width="2"/>
    <line x1="-52" y1="30" x2="-78" y2="45" stroke="#00D4FF" stroke-width="2"/>
    <line x1="-52" y1="-30" x2="-78" y2="-45" stroke="#00D4FF" stroke-width="2"/>
  </g>
  
  <!-- Processing Dots -->
  <g>
    <circle cx="200" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="350" r="8" fill="#00D4FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text -->
  <text x="400" y="400" font-family="Arial" font-size="24" fill="white" text-anchor="middle">Génération de Script IA</text>
  <text x="400" y="430" font-family="Arial" font-size="14" fill="#00D4FF" text-anchor="middle">E-Studio AI</text>
</svg>