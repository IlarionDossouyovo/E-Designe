<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <!-- Premium Gold Gradients -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8E08E"/>
      <stop offset="20%" stop-color="#D4AF37"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="80%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6B1F"/>
    </linearGradient>
    
    <linearGradient id="goldVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="15%" stop-color="#F8E08E"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="65%" stop-color="#D4AF37"/>
      <stop offset="85%" stop-color="#8B6B1F"/>
      <stop offset="100%" stop-color="#6B4F1F"/>
    </linearGradient>
    
    <linearGradient id="goldHorizontal" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#8B6B1F"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6B1F"/>
    </linearGradient>
    
    <linearGradient id="lightningGold" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#F8E08E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="75%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6B1F"/>
    </linearGradient>
    
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F8E08E" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Filters -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="premiumShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="0" dy="2"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1" k3="1"/>
    </filter>
    
    <filter id="metalShine" x="-20%" y="-20%" width="140%" height="140%">
      <feSpecularLighting in="SourceAlpha" specularConstant="1" specularExponent="20" lighting-color="#FFFFFF" result="specular">
        <fePointLight x="400" y="100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularOut"/>
      <feComposite in="SourceGraphic" in2="specularOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>
  
  <!-- Premium Dark Background -->
  <rect width="800" height="900" fill="#0A0A0A"/>
  
  <!-- Wall Texture Effect -->
  <rect width="800" height="900" fill="url(#spotlight)"/>
  
  <!-- Ambient Golden Glow Behind Logo -->
  <ellipse cx="400" cy="380" rx="320" ry="300" fill="url(#ambientGlow)"/>
  
  <!-- Main Logo Group -->
  <g filter="url(#premiumShadow)">
    
    <!-- Open Circle - Outer Ring -->
    <path d="M 400 100 
             A 280 280 0 1 1 399.99 100
             M 400 145
             A 235 235 0 1 0 400.01 145"
          fill="none" 
          stroke="url(#goldVertical)" 
          stroke-width="14"
          stroke-linecap="round"/>
    
    <!-- Circle Inner Edge Highlight -->
    <path d="M 400 145
             A 235 235 0 1 0 399.99 145"
          fill="none" 
          stroke="#F8E08E" 
          stroke-width="2"
          stroke-opacity="0.5"
          stroke-linecap="round"/>
  </g>
  
  <!-- Feather Group -->
  <g filter="url(#softGlow)">
    <!-- Feather Central Shaft -->
    <path d="M 400 180 L 400 520" stroke="url(#goldVertical)" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Feather Left Curve -->
    <path d="M 400 200 
             Q 350 260 330 340 
             Q 315 420 335 490 
             Q 355 550 400 570"
          fill="none"
          stroke="url(#goldMain)"
          stroke-width="5"
          stroke-linecap="round"/>
    
    <!-- Feather Right Curve -->
    <path d="M 400 200 
             Q 450 260 470 340 
             Q 485 420 465 490 
             Q 445 550 400 570"
          fill="none"
          stroke="url(#goldMain)"
          stroke-width="5"
          stroke-linecap="round"/>
    
    <!-- Feather Barbs - Left Side -->
    <g stroke="url(#goldHorizontal)" stroke-width="2.5" stroke-linecap="round">
      <line x1="375" y1="230" x2="345" y2="218"/>
      <line x1="362" y1="275" x2="327" y2="270"/>
      <line x1="352" y1="320" x2="312" y2="320"/>
      <line x1="347" y1="365" x2="302" y2="370"/>
      <line x1="347" y1="410" x2="297" y2="420"/>
      <line x1="352" y1="455" x2="302" y2="470"/>
      <line x1="362" y1="500" x2="317" y2="520"/>
      <line x1="377" y1="540" x2="342" y2="560"/>
    </g>
    
    <!-- Feather Barbs - Right Side -->
    <g stroke="url(#goldHorizontal)" stroke-width="2.5" stroke-linecap="round">
      <line x1="425" y1="230" x2="455" y2="218"/>
      <line x1="438" y1="275" x2="473" y2="270"/>
      <line x1="448" y1="320" x2="488" y2="320"/>
      <line x1="453" y1="365" x2="498" y2="370"/>
      <line x1="453" y1="410" x2="503" y2="420"/>
      <line x1="448" y1="455" x2="498" y2="470"/>
      <line x1="438" y1="500" x2="483" y2="520"/>
      <line x1="423" y1="540" x2="458" y2="560"/>
    </g>
  </g>
  
  <!-- Central Dot -->
  <circle cx="400" cy="175" r="14" fill="url(#goldVertical)" filter="url(#softGlow)"/>
  <circle cx="400" cy="175" r="8" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Feather Tip -->
  <path d="M 400 545 
           Q 392 565 388 585 
           Q 385 600 400 615 
           Q 415 600 412 585 
           Q 408 565 400 545"
        fill="url(#goldVertical)"
        filter="url(#softGlow)"/>
  
  <!-- Lightning Bolt -->
  <g filter="url(#softGlow)">
    <path d="M 400 115
             L 378 165
             L 400 165
             L 385 220
             L 428 155
             L 408 155
             L 420 105
             Z"
        fill="url(#lightningGold)"/>
  </g>
  
  <!-- Lightning Accent Lines -->
  <path d="M 410 120 L 392 162 L 410 162 L 398 205 L 435 148 L 416 148 L 428 112 Z"
        fill="#F8E08E" opacity="0.4"/>
  
  <!-- Text: E-GRAPHISME -->
  <text x="400" y="720" 
        font-family="'Futura', 'Avant Garde', 'Century Gothic', sans-serif"
        font-size="56"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="6">E-GRAPHISME</text>
  
  <!-- Text: BY ELECTRON -->
  <text x="400" y="770" 
        font-family="'Futura', 'Avant Garde', 'Century Gothic', sans-serif"
        font-size="32"
        font-weight="400"
        fill="#D4AF37"
        text-anchor="middle"
        letter-spacing="14">BY ELECTRON</text>
  
  <!-- Divider Line -->
  <line x1="250" y1="800" x2="550" y2="800" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
  
  <!-- Tagline -->
  <text x="400" y="835" 
        font-family="'Futura', 'Avant Garde', 'Century Gothic', sans-serif"
        font-size="16"
        font-weight="300"
        fill="#999999"
        text-anchor="middle"
        letter-spacing="8">CRÉATIVITÉ • INNOVATION • EXCELLENCE</text>
  
  <!-- Slogan -->
  <text x="400" y="875" 
        font-family="'Futura', 'Avant Garde', 'Century Gothic', sans-serif"
        font-size="18"
        font-weight="300"
        font-style="italic"
        fill="#D4AF37"
        text-anchor="middle"
        letter-spacing="2">« Là où la créativité rencontre la technologie »</text>
</svg>