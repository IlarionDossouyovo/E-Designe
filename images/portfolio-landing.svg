<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FFF"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="400" height="30" fill="#0f0f1a"/>
  <rect x="20" y="8" width="60" height="14" rx="3" fill="url(#accent)"/>
  <rect x="320" y="10" width="30" height="10" rx="2" fill="#333"/>
  <rect x="355" y="10" width="30" height="10" rx="2" fill="#333"/>
  <!-- Hero section -->
  <rect x="30" y="50" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#00D4FF" stroke-width="2"/>
  <rect x="50" y="65" width="100" height="12" rx="3" fill="url(#accent)"/>
  <rect x="50" y="85" width="120" height="8" rx="2" fill="#444"/>
  <rect x="50" y="100" width="80" height="20" rx="4" fill="url(#accent)"/>
  <!-- CTA Button -->
  <rect x="200" y="60" width="160" height="100" rx="8" fill="#15152a" stroke="#7B2FFF" stroke-width="1"/>
  <circle cx="280" cy="90" r="25" fill="url(#accent)" opacity="0.3"/>
  <circle cx="280" cy="90" r="15" fill="url(#accent)"/>
  <path d="M275 90 L285 85 L285 95 Z" fill="#fff"/>
  <!-- Features -->
  <rect x="30" y="150" width="80" height="60" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <rect x="40" y="160" width="25" height="25" rx="4" fill="#00D4FF" opacity="0.5"/>
  <rect x="70" y="165" width="30" height="6" rx="2" fill="#444"/>
  <rect x="70" y="175" width="25" height="5" rx="1" fill="#333"/>
  <rect x="120" y="150" width="80" height="60" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <rect x="130" y="160" width="25" height="25" rx="4" fill="#7B2FFF" opacity="0.5"/>
  <rect x="160" y="165" width="30" height="6" rx="2" fill="#444"/>
  <rect x="160" y="175" width="25" height="5" rx="1" fill="#333"/>
  <rect x="210" y="150" width="80" height="60" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <rect x="220" y="160" width="25" height="25" rx="4" fill="#FF006E" opacity="0.5"/>
  <rect x="250" y="165" width="30" height="6" rx="2" fill="#444"/>
  <rect x="250" y="175" width="25" height="5" rx="1" fill="#333"/>
  <!-- Bottom bar -->
  <rect x="0" y="270" width="400" height="30" fill="#0f0f1a"/>
  <rect x="20" y="280" width="100" height="8" rx="2" fill="#333"/>
  <rect x="280" y="280" width="60" height="8" rx="2" fill="#333"/>
  <!-- Glow effects -->
  <circle cx="50" cy="40" r="60" fill="#00D4FF" opacity="0.05"/>
  <circle cx="350" cy="60" r="80" fill="#7B2FFF" opacity="0.05"/>
</svg>