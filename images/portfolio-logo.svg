<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f0f1a"/>
  
  <!-- Logo Showcase -->
  <rect x="100" y="60" width="200" height="120" rx="8" fill="#1a1a2e" stroke="url(#logoGrad)" stroke-width="2"/>
  
  <!-- E-Graphisme Logo Concept -->
  <g transform="translate(200, 115)">
    <polygon points="0,-45 40,-15 40,25 0,55 -40,25 -40,-15" fill="url(#logoGrad)" opacity="0.8"/>
    <text x="0" y="5" font-family="Arial" font-size="18" fill="white" text-anchor="middle" font-weight="bold">E</text>
  </g>
  
  <!-- Brand Elements -->
  <rect x="80" y="210" width="60" height="4" rx="2" fill="#6366f1"/>
  <rect x="160" y="210" width="80" height="4" rx="2" fill="#8b5cf6"/>
  <rect x="260" y="210" width="60" height="4" rx="2" fill="#a855f7"/>
  
  <!-- Label -->
  <text x="200" y="270" font-family="Arial" font-size="20" fill="white" text-anchor="middle" font-weight="bold">LOGO DESIGN</text>
</svg>