<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 
    E-DÉSIGNE - BRAND LOGO
    Premium AI-Powered Design Platform
    By ELECTRON
  -->
  
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#0a0a0f"/>
  
  <!-- Main "E" Symbol with Electron Effect -->
  <g transform="translate(24, 24)">
    <!-- Outer E - Geometric Bold -->
    <path 
      d="M8 8H56C58.2091 8 60 9.79086 60 12V20C60 22.2091 58.2091 24 56 24H32V36H52C54.2091 36 56 37.7909 56 40V48C56 50.2091 54.2091 52 52 52H32V64H56C58.2091 64 60 65.7909 60 68V76C60 78.2091 58.2091 80 56 80H8V8Z" 
      fill="url(#gradientEDark)"
    />
    
    <!-- Electron Orbit Ring -->
    <ellipse cx="32" cy="42" rx="28" ry="28" 
      stroke="#4B6CB7" stroke-width="1.5" fill="none" opacity="0.5"/>
    
    <!-- Electron Dots on Orbit -->
    <circle cx="32" cy="14" r="2.5" fill="#4B6CB7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="42" r="2.5" fill="#6B8DD6">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="70" r="2.5" fill="#4B6CB7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- AI Neural Flow Lines -->
    <path
      d="M20 28L28 32L20 36"
      stroke="#A0B8E8"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.8"
    />
    
    <path
      d="M20 52L28 56L20 60"
      stroke="#A0B8E8"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.8"
    />
    
    <!-- Digital Circuit Details -->
    <circle cx="44" cy="16" r="4" fill="#6B8DD6" opacity="0.8"/>
    <circle cx="44" cy="72" r="4" fill="#FFD700" opacity="0.9"/>
    
    <!-- Neural Dots -->
    <circle cx="32" cy="16" r="2" fill="#A0B8E8"/>
    <circle cx="32" cy="72" r="2" fill="#A0B8E8"/>
    
    <!-- Glow Effect -->
    <circle cx="16" cy="44" r="1.5" fill="#4B6CB7" opacity="0.6">
      <animate attributeName="r" values="1.5;3;1.5" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="44" r="1.5" fill="#4B6CB7" opacity="0.6">
      <animate attributeName="r" values="1.5;3;1.5" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Gradient Definition -->
    <defs>
      <linearGradient id="gradientEDark" x1="8" y1="8" x2="60" y2="80" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#4B6CB7"/>
        <stop offset="100%" stop-color="#7BA3E8"/>
      </linearGradient>
    </defs>
  </g>
  
  <!-- Text: E-Designe -->
  <text x="60" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" letter-spacing="0.5">
    E-Designe
  </text>
</svg>