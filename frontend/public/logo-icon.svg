/* E-Désigne Logo - Square Icon for App/Favicon */
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#19232D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1419;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B6CB7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B8DD6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5D67A;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.1">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#4B6CB7" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#4B6CB7" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#4B6CB7" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#4B6CB7" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#4B6CB7" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#4B6CB7" stroke-width="1"/>
  </g>

  <!-- Main E Symbol - Abstract futuristic -->
  <g transform="translate(106, 130)" filter="url(#softGlow)">
    <!-- Outer E shape -->
    <path d="M0 0 L180 0 L180 40 L50 40 L50 80 L160 80 L160 120 L50 120 L50 170 L180 170 L180 210 L0 210 Z" 
          fill="url(#accentGradient)"/>
    
    <!-- Inner cutouts for depth -->
    <path d="M60 55 L150 55 L150 75 L60 75 Z" fill="#19232D" opacity="0.3"/>
    <path d="M60 100 L140 100 L140 115 L60 115 Z" fill="#19232D" opacity="0.3"/>
    <path d="M60 145 L150 145 L150 165 L60 165 Z" fill="#19232D" opacity="0.3"/>
    
    <!-- Accent line -->
    <rect x="-15" y="20" width="8" height="170" fill="url(#goldGradient)" rx="2"/>
    
    <!-- Tech nodes -->
    <circle cx="200" cy="30" r="8" fill="#4B6CB7"/>
    <circle cx="220" cy="60" r="5" fill="#6B8DD6" opacity="0.8"/>
    <circle cx="210" cy="100" r="6" fill="#4B6CB7"/>
    <circle cx="230" cy="140" r="4" fill="#6B8DD6" opacity="0.6"/>
    <circle cx="200" cy="180" r="7" fill="#4B6CB7"/>
    
    <!-- Circuit lines -->
    <path d="M190 30 L240 30 Q250 30 250 40 L250 50" stroke="#4B6CB7" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M225 60 L260 60 L260 90 L280 90" stroke="#4B6CB7" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M210 100 L255 100 L255 130 L275 130" stroke="#4B6CB7" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M220 140 L265 140 L265 170" stroke="#4B6CB7" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Small E text at bottom -->
  <text x="256" y="470" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="24" font-weight="600" fill="#4B6CB7" letter-spacing="4">E-DÉSIGNE</text>
</svg>