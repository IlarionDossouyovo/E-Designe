version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: edesigne-db
    environment:
      POSTGRES_USER: edesigne
      POSTGRES_PASSWORD: edesigne_password_2024
      POSTGRES_DB: edesigne_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edesigne"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n pour les automatisations
  n8n:
    image: n8nio/n8n
    container_name: edesigne-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=edesigne2024
      - N8N_HOST=localhost:5678
      - WEBHOOK_URL=http://localhost:5678
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - QUEUES_BULL_ENABLED=true
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    depends_on:
      - postgres
    restart: unless-stopped

  # API REST locale (connectée à Ollama)
  api:
    image: node:20-alpine
    container_name: edesigne-api
    working_dir: /app
    command: sh -c "npm install && npm run start"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://edesigne:edesigne_password_2024@postgres:5432/edesigne_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Redis pour le cache et les sessions
  redis:
    image: redis:7-alpine
    container_name: edesigne-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  redis_data: