services:
  # Site Web E-Graphisme
  web:
    build: .
    network_mode: host
    volumes:
      - ./db:/workspace/project/E-Graphisme/db
      - ./php:/workspace/project/E-Graphisme/php
    environment:
      - OLLAMA_HOST=http://127.0.0.1:11434
      - N8N_WEBHOOK_URL=http://127.0.0.1:5678/webhook
    command: php -S 127.0.0.1:8000 -t /workspace/project/E-Graphisme

  # N8N pour automatisation
  n8n:
    image: n8nio/n8n:latest
    network_mode: host
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_EMAIL=admin@e-graphisme.com
      - N8N_PASSWORD=egraphisme2026
      - N8N_HOST=http://127.0.0.1:5678
      - WEBHOOK_URL=http://127.0.0.1:5678
      - GENERIC_TIMEZONE=Africa/Cotonou
    volumes:
      - n8n-data:/home/node/.n8n

  # Database (MariaDB pour production)
  database:
    image: mariadb:10.11
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=egraphisme_root
      - MYSQL_DATABASE=egraphisme
      - MYSQL_USER=egraphisme_user
      - MYSQL_PASSWORD=egraphisme_pass
    volumes:
      - db-data:/var/lib/mysql

volumes:
  n8n-data:
  db-data: