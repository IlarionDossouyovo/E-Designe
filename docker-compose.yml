services:
  # Site Web E-Graphisme
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./db:/var/www/html/db
      - ./php:/var/www/html/php
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DB_HOST=database
    depends_on:
      - database

  # Database (MariaDB pour production)
  database:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=egraphisme_root
      - MYSQL_DATABASE=egraphisme
      - MYSQL_USER=egraphisme_user
      - MYSQL_PASSWORD=egraphisme_pass
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

volumes:
  db-data: