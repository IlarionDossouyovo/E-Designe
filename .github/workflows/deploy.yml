name: Deploy to Vercel
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fresh install
        run: |
          rm -rf frontend/node_modules
          cd frontend && npm ci --legacy-peer-deps --no-cache
      - name: Build
        run: cd frontend && npm run build
      - name: Deploy
        run: npm install -g vercel@latest && vercel --yes --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
