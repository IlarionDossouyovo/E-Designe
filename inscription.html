<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - E-Studio | Créez Votre Compte</title>
    <meta name="description" content="Créez votre compte E-Studio et commencez à créer des vidéos professionnelles avec l'IA.">
    <meta name="keywords" content="E-Studio, inscription, compte, création vidéo, IA">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00D4FF;
            --secondary: #7B2FFF;
            --accent: #FF006E;
            --dark: #0a0a0f;
            --darker: #050508;
            --light: #ffffff;
            --gray: #1a1a2e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow-1 {
            top: -200px;
            right: -200px;
            background: var(--primary);
        }
        
        .bg-glow-2 {
            bottom: -200px;
            left: -200px;
            background: var(--secondary);
        }
        
        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--light);
        }
        
        .logo-text span {
            color: var(--primary);
        }
        
        .header-links {
            display: flex;
            gap: 30px;
        }
        
        .header-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .header-links a:hover {
            color: var(--primary);
        }
        
        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Form Container */
        .form-container {
            background: linear-gradient(135deg, var(--gray) 0%, var(--dark) 100%);
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.1);
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .form-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .form-header h1 i {
            color: var(--primary);
            margin-right: 10px;
        }
        
        .form-header p {
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Form */
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--light);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: start;
            gap: 12px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkbox-group label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }
        
        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .checkbox-group a:hover {
            text-decoration: underline;
        }
        
        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 18px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        /* Social Login */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .social-btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--light);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .social-btn.google i {
            color: #DB4437;
        }
        
        .social-btn.apple {
            color: #fff;
        }
        
        /* Footer */
        footer {
            padding: 20px 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--gray);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            color: var(--light);
            font-size: 0.95rem;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.error {
            border-color: #ff6b6b;
        }
        
        .toast.success {
            border-color: #10b981;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 15px 20px;
            }
            
            .header-links {
                display: none;
            }
            
            .form-container {
                padding: 30px 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <!-- Header -->
    <header>
        <a href="index.html" class="logo">
            <img src="images/logo-estudio-icon.svg" alt="E-Studio" class="logo-icon">
            <span class="logo-text">E-<span>Studio</span></span>
        </a>
        <div class="header-links">
            <a href="index.html">Accueil</a>
            <a href="studio.html">E-Studio</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>
    
    <!-- Main -->
    <main>
        <div class="form-container">
            <div class="form-header">
                <h1><i class="fas fa-rocket"></i> Créer un Compte</h1>
                <p>Commencez gratuitement avec E-Studio</p>
            </div>
            
            <form id="inscription-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="nom" placeholder="Votre nom" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="vous@email.com" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="password" placeholder="••••••••" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label>Confirmer</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Type de compte</label>
                    <select id="type-compte">
                        <option value="gratuit">Essai Gratuit</option>
                        <option value="pro">Professionnel - 29€/mois</option>
                        <option value="entreprise">Entreprise - 99€/mois</option>
                    </select>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">J'accepte les <a href="terms.html">Conditions</a> et la <a href="privacy.html">Politique de confidentialité</a></label>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-rocket"></i>
                    Créer mon compte
                </button>
            </form>
            
            <div class="divider">
                <span>ou</span>
            </div>
            
            <div class="social-login">
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="social-btn apple">
                    <i class="fab fa-apple"></i>
                    Apple
                </button>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer>
        <p>© 2024 E-Studio par E-Graphisme. Tous droits réservés.</p>
    </footer>
    
    <!-- Toast -->
    <div id="toast" class="toast"></div>
    
    <script>
        // Toast function
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Form submission
        document.getElementById('inscription-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const typeCompte = document.getElementById('type-compte').value;
            
            if (password !== confirmPassword) {
                showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            
            // Simulate registration
            const btn = e.submitter;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création...';
            btn.disabled = true;
            
            setTimeout(() => {
                showToast('Compte créé avec succès!', 'success');
                btn.innerHTML = '<i class="fas fa-check"></i> Compte créé!';
                
                // Redirect based on account type
                setTimeout(() => {
                    if (typeCompte === 'gratuit') {
                        window.location.href = 'studio.html';
                    } else {
                        window.location.href = 'studio.html#pricing';
                    }
                }, 1500);
            }, 2000);
        });
        
        // Social buttons
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                showToast('Connexion sociale bientôt disponible', 'info');
            });
        });
    </script>
</body>
</html>
